# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    branches:
      v1.0.0-beta10


# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write

jobs:
  build:
    name: Build
    env:
      # GitHub sets the GITHUB_TOKEN secret automatically.
        GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure git for private modules
        run: |
          git config --global url."https://$GITHUB_TOKEN@github.ibm.com/".insteadOf "https://github.ibm.com/"
      - uses: actions/checkout@v4.2.2 # v4.2.2
      - uses: actions/setup-go@v5.3.0 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
          token: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
      - run: go mod download
      - run: go build -v .
  
  golangci:
    name: lint
    env:
      # GitHub sets the GITHUB_TOKEN secret automatically.
        GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git for private modules
        run: |
          git config --global url."https://$GITHUB_TOKEN@github.ibm.com/".insteadOf "https://github.ibm.com/"
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
  
  test:
    name: Acceptance Tests and Unit Tests
    env:
        ODE_HOST: ${{ secrets.ODE_HOST }}
        ODE_USERNAME: ${{ secrets.ODE_USERNAME }}
        ODE_PASSWORD: ${{ secrets.ODE_PASSWORD }}
        SSH_TARG_ROOT_PASS: ${{ secrets.SSH_TARG_ROOT_PASS }}
        SSH_TARGET_PASSWORD: ${{ secrets.SSH_TARGET_PASSWORD }}
        SSH_TARGET_USER: ${{ secrets.SSH_TARGET_USER }}
        GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
        SSH_PASSWORD: ${{ secrets.SSH_TARGET_PASSWORD }}
        INSTANCE_DEPLOYMENT_DIRECTORY: ${{ secrets.INSTANCE_DEPLOYMENT_DIRECTORY }}
        INSTANCE_DESCRIPTION: ${{ secrets.INSTANCE_DESCRIPTION }}
        INSTANCE_IMAGE_UUID: ${{ secrets.INSTANCE_IMAGE_UUID }}
        INSTANCE_LABEL: ${{ secrets.INSTANCE_LABEL }}
        INSTANCE_SSH_PASSWORD: ${{ secrets.INSTANCE_SSH_PASSWORD }}
        INSTANCE_SSH_PUBLIC_KEY: ${{ secrets.INSTANCE_SSH_PUBLIC_KEY }}
        INSTANCE_SSH_USER: ${{ secrets.INSTANCE_SSH_USER }}
        INSTANCE_SYSRES_COMPONENT_UUID: ${{ secrets.INSTANCE_SYSRES_COMPONENT_UUID }}
        INSTANCE_TARGET_UUID: ${{ secrets.INSTANCE_TARGET_UUID }}
        TARGET_ZOS_IP: ${{ secrets.TARGET_ZOS_IP }}
        TARGET_DNS_DOMAIN_ORIGIN: ${{ secrets.TARGET_DNS_DOMAIN_ORIGIN }}
        TARGET_DNS_IP_PRIMARY: ${{ secrets.TARGET_DNS_IP_PRIMARY }}
        TARGET_HOSTNAME: ${{ secrets.TARGET_HOSTNAME }}
        TARGET_LABEL: ${{ secrets.TARGET_LABEL }}
        TARGET_SSH_PASSWORD: ${{ secrets.TARGET_SSH_PASSWORD }}
        TARGET_SSH_USER: ${{ secrets.TARGET_SSH_USER }}
    # needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2 # v4.2.2
      - uses: actions/setup-go@v5.3.0 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: make testacc
      - run: make test
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2 # v4.2.2
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@v5.3.0 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6.2.0 # v6.2.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6.2.0 # v6.2.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  terraform-provider-release:
    name: 'Terraform Provider Release'
    uses: hashicorp/ghaction-terraform-provider-release/.github/workflows/hashicorp.yml@v4
    secrets:
      hc-releases-github-token: '${{ secrets.HASHI_RELEASES_GITHUB_TOKEN }}'
      hc-releases-host-staging: '${{ secrets.HC_RELEASES_HOST_STAGING }}'
      hc-releases-host-prod: '${{ secrets.HC_RELEASES_HOST_PROD }}'
      hc-releases-key-prod: '${{ secrets.HC_RELEASES_KEY_PROD }}'
      hc-releases-key-staging: '${{ secrets.HC_RELEASES_KEY_STAGING }}'
      hc-releases-terraform-registry-sync-token: '${{ secrets.TF_PROVIDER_RELEASE_TERRAFORM_REGISTRY_SYNC_TOKEN }}'
      setup-signore-github-token: '${{ secrets.HASHI_SIGNORE_GITHUB_TOKEN }}'
      signore-client-id: '${{ secrets.SIGNORE_CLIENT_ID }}'
      signore-client-secret: '${{ secrets.SIGNORE_CLIENT_SECRET }}'
    with:
      setup-go-version-file: 'go.mod'
      product-version: 'v1.2.3'

